syntax = "proto3";

package property;

service PropertyLookup {
    rpc AddressByParcel(ParcelRequest) returns (AddressResponse);
    rpc AddressByZip(ZipRequest) returns (AddressResponse);
}

message ParcelRequest {
    string parcel = 1;
}

message ZipRequest {
    string zip = 1;
}

message AddressResponse {
    repeated string addresses = 1;
    reserved 2;
    string error = 3;
}
